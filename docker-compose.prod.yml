# Production stack: API + dashboard containers against a managed database
# (AWS RDS). DATABASE_URL comes from .env on the server.
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file: .env
    ports:
      - "8000:8000"
    restart: always

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    env_file: .env  # FALLWATCH_API_KEY for authenticated write calls
    environment:
      - FALLWATCH_API_URL=http://backend:8000
    ports:
      - "8501:8501"
    restart: always
    depends_on:
      - backend
